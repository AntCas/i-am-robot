"$schema" = "./node_modules/wrangler/config-schema.json"
name = "i-am-robot"
main = "src/index.ts"
compatibility_date = "2026-04-21"

[[routes]]
pattern = "castrio.me/im-a-robot"
zone_name = "castrio.me"

[[routes]]
pattern = "castrio.me/im-a-robot/*"
zone_name = "castrio.me"

[[kv_namespaces]]
binding = "SITES"
id = "5d08b49c2ed84c469c5a538287bae77a"

[[kv_namespaces]]
binding = "SESSIONS"
id = "1c09e57011bf43c299ab6bab742996d9"

[vars]
DEFAULT_SITE_CONFIG = "{\"siteKey\":\"site_demo_123\",\"secret\":\"secret_demo_abc\",\"allowedHostnames\":[\"castrio.me\",\"localhost:8787\",\"localhost:3000\",\"127.0.0.1:3000\"]}"
DEV_SIGNING_SECRET = "local-demo-signing-secret-change-me"

[assets]
directory = "./site"
binding = "ASSETS"
run_worker_first = true
html_handling = "none"
